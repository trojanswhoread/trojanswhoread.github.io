---
layout: default
---

<div id="previous-reads" class="container row">
    {% assign steps = site.steps | sort: 'date' | reverse %}
    {% for step in steps %}
    <div class="item">
        <i class="vertical-line"></i>
        <h2 class="item-date">{{ step.date | date: '%B %Y' }}</h2>
        <div class="card-panel">
            <a href="{{ step.link }}" target="_blank" style="width: fit-content;color: inherit;">
                <h3 class="card-title">
                    {{ step.title }}
                </h3>
                <h4 class="card-title">
                    {{ step.author }}
                </h4>
                <img src="assets/img/books/{{ step.title }}.jpg" width="400px"/>
            </a>
        </div>
    </div>
    {% endfor %}
    <div class="last-item">
        <i class="vertical-line"></i>
    </div>
</div>
